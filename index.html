<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            name="description"
            content="Applied Archive Atelier is a creative studio amplifying non-profits, cultural institutions and social businesses."
        />
        <!-- Social share preview (Open Graph + Twitter). Crawlers don't run JS,
             so these live in the static HTML and the image is an absolute URL
             served from /public. Update the domain if the canonical URL changes. -->
        <meta property="og:type" content="website" />
        <meta property="og:site_name" content="Applied Archive Atelier" />
        <meta property="og:title" content="Applied Archive Atelier" />
        <meta
            property="og:description"
            content="Applied Archive Atelier is a creative studio amplifying non-profits, cultural institutions and social businesses."
        />
        <meta property="og:url" content="https://www.appliedarchiveatelier.com" />
        <meta
            property="og:image"
            content="https://www.appliedarchiveatelier.com/SharePreview.png"
        />
        <meta property="og:image:width" content="1725" />
        <meta property="og:image:height" content="872" />
        <meta property="og:image:alt" content="Applied Archive Atelier" />
        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:title" content="Applied Archive Atelier" />
        <meta
            name="twitter:description"
            content="Applied Archive Atelier is a creative studio amplifying non-profits, cultural institutions and social businesses."
        />
        <meta
            name="twitter:image"
            content="https://www.appliedarchiveatelier.com/SharePreview.png"
        />
        <link
            rel="preload"
            href="/fonts/ABCFavorit-Book.ttf"
            as="font"
            type="font/ttf"
            crossorigin=""
        />
        <link
            rel="preload"
            href="/fonts/ABCFavorit-Medium.ttf"
            as="font"
            type="font/ttf"
            crossorigin=""
        />
        <link
            rel="preload"
            href="/fonts/ABCFavorit-Bold.ttf"
            as="font"
            type="font/ttf"
            crossorigin=""
        />
        <title>Applied Archive Atelier</title>
    </head>
    <body class="font-sans antialiased">
        <div id="root"></div>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
